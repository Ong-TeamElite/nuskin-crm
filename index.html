<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nu Skin CRM</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      color: #0082c6;
      font-size: 22px;
      margin: 0;
    }

    .lang-btn {
      background: #e2e8f0;
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .radio-group {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      background: #f8fafc;
      padding: 15px;
      border-radius: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .radio-option input {
      width: auto;
      margin: 0;
    }

    .radio-option label {
      display: inline;
      margin: 0;
      font-size: 14px;
      font-weight: 700;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 5px;
      color: #475569;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 15px;
    }

    button.primary {
      width: 100%;
      background: #0082c6;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button.primary:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    #successMsg {
      display: none;
      padding: 15px;
      background: #dcfce3;
      color: #166534;
      text-align: center;
      border-radius: 6px;
      font-weight: bold;
      margin-top: 15px;
    }

    #errorMsg {
      display: none;
      padding: 15px;
      background: #fee2e2;
      color: #991b1b;
      text-align: center;
      border-radius: 6px;
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="header-bar">
    <h1 id="titleText">Nu Skin CRM</h1>
    <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN / TH</button>
  </div>

  <div class="radio-group">
    <div class="radio-option">
      <input type="radio" id="typeNew" name="custType" value="new" checked onchange="toggleCustomerType()">
      <label for="typeNew" id="lblNew">New Customer</label>
    </div>

    <div class="radio-option">
      <input type="radio" id="typeExist" name="custType" value="exist" onchange="toggleCustomerType()">
      <label for="typeExist" id="lblExist">Existing Customer</label>
    </div>
  </div>

  <form id="crmForm">

    <label id="lblName">Full Name</label>
    <input type="text" id="name" required placeholder="Enter new customer full name">

    <div id="newCustFields">
      <div style="display:flex; gap:10px;">
        <div style="flex:1;">
          <label id="lblSex">Sex</label>
          <select id="sex">
            <option value="F" id="optFemale">Female</option>
            <option value="M" id="optMale">Male</option>
          </select>
        </div>

        <div style="flex:1;">
          <label id="lblAge">Age</label>
          <input type="number" id="age">
        </div>
      </div>

      <label id="lblPhone">Tel</label>
      <input type="tel" id="phone">

      <label id="lblLine">LINE ID</label>
      <input type="text" id="line">

      <label id="lblSocial">Social Media Link</label>
      <input type="text" id="social">

      <label id="lblProb">Health Problem</label>
      <input type="text" id="healthProb">

      <label id="lblGoal">Health Goal</label>
      <input type="text" id="healthGoal">
    </div>

    <label id="lblProd">Product Name</label>
    <input type="text" id="product" required>

    <div style="display:flex; gap:10px;">
      <div style="flex:1;">
        <label id="lblQty">Amount</label>
        <input type="number" id="qty" required value="1">
      </div>

      <div style="flex:1;">
        <label id="lblCost">Total Cost</label>
        <input type="number" id="total" required>
      </div>
    </div>

    <label id="lblRunOut">Run Out (Months)</label>
    <select id="runOut"></select>

    <button type="submit" class="primary" id="btnSave">Save Order & Set Calendar</button>
  </form>

  <div id="successMsg">Data Saved!</div>
  <div id="errorMsg"></div>
</div>

<script>
  const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyLL-wNiC2ZBdfkwFzYukfPCc_yx6UMbIIuO33BGZpS_ZxvQ65hEzcOzuEfS7RJ21Nt/exec";

  let currentLang = "EN";

  const text = {
    EN: {
      title: "Nu Skin CRM",
      newCustomer: "New Customer",
      existingCustomer: "Existing Customer",
      fullName: "Full Name",
      newNamePlaceholder: "Enter new customer full name",
      existingNamePlaceholder: "Enter existing customer full name",
      sex: "Sex",
      female: "Female",
      male: "Male",
      age: "Age",
      tel: "Tel",
      line: "LINE ID",
      social: "Social Media Link",
      healthProblem: "Health Problem",
      healthGoal: "Health Goal",
      product: "Product Name",
      amount: "Amount",
      totalCost: "Total Cost",
      runOut: "Run Out (Months)",
      save: "Save Order & Set Calendar",
      saved: "Data Saved!",
      saving: "Saving..."
    },
    TH: {
      title: "Nu Skin CRM",
      newCustomer: "ลูกค้าใหม่",
      existingCustomer: "ลูกค้าเดิม",
      fullName: "ชื่อ-นามสกุล",
      newNamePlaceholder: "กรอกชื่อลูกค้าใหม่",
      existingNamePlaceholder: "กรอกชื่อลูกค้าเดิม",
      sex: "เพศ",
      female: "หญิง",
      male: "ชาย",
      age: "อายุ",
      tel: "เบอร์โทร",
      line: "LINE ID",
      social: "ลิงก์โซเชียล",
      healthProblem: "ปัญหาสุขภาพ",
      healthGoal: "เป้าหมายสุขภาพ",
      product: "ชื่อสินค้า",
      amount: "จำนวน",
      totalCost: "ยอดรวม",
      runOut: "สินค้าหมดในกี่เดือน",
      save: "บันทึกออเดอร์และตั้งเตือน",
      saved: "บันทึกข้อมูลแล้ว!",
      saving: "กำลังบันทึก..."
    }
  };

  const runOutSelect = document.getElementById("runOut");

  function setupRunOutDropdown() {
    runOutSelect.innerHTML = "";

    for (let i = 1; i <= 12; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.innerHTML = currentLang === "EN" ? i + " Months" : i + " เดือน";
      runOutSelect.appendChild(opt);
    }
  }

  function toggleCustomerType() {
    const isNew = document.getElementById("typeNew").checked;

    document.getElementById("newCustFields").style.display = isNew ? "block" : "none";

    if (isNew) {
      document.getElementById("name").placeholder = text[currentLang].newNamePlaceholder;
    } else {
      document.getElementById("name").placeholder = text[currentLang].existingNamePlaceholder;
    }
  }

  function toggleLang() {
    currentLang = currentLang === "EN" ? "TH" : "EN";
    applyLanguage();
  }

  function applyLanguage() {
    const t = text[currentLang];

    document.getElementById("titleText").innerText = t.title;
    document.getElementById("lblNew").innerText = t.newCustomer;
    document.getElementById("lblExist").innerText = t.existingCustomer;
    document.getElementById("lblName").innerText = t.fullName;
    document.getElementById("lblSex").innerText = t.sex;
    document.getElementById("optFemale").innerText = t.female;
    document.getElementById("optMale").innerText = t.male;
    document.getElementById("lblAge").innerText = t.age;
    document.getElementById("lblPhone").innerText = t.tel;
    document.getElementById("lblLine").innerText = t.line;
    document.getElementById("lblSocial").innerText = t.social;
    document.getElementById("lblProb").innerText = t.healthProblem;
    document.getElementById("lblGoal").innerText = t.healthGoal;
    document.getElementById("lblProd").innerText = t.product;
    document.getElementById("lblQty").innerText = t.amount;
    document.getElementById("lblCost").innerText = t.totalCost;
    document.getElementById("lblRunOut").innerText = t.runOut;
    document.getElementById("btnSave").innerText = t.save;
    document.getElementById("successMsg").innerText = t.saved;

    setupRunOutDropdown();
    toggleCustomerType();
  }

  document.getElementById("crmForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const btn = document.getElementById("btnSave");
    const successMsg = document.getElementById("successMsg");
    const errorMsg = document.getElementById("errorMsg");

    btn.disabled = true;
    btn.innerText = text[currentLang].saving;
    successMsg.style.display = "none";
    errorMsg.style.display = "none";

    const data = {
      isNew: document.getElementById("typeNew").checked,
      name: document.getElementById("name").value.trim(),
      sex: document.getElementById("sex").value,
      age: document.getElementById("age").value,
      phone: document.getElementById("phone").value,
      line: document.getElementById("line").value,
      social: document.getElementById("social").value,
      healthProb: document.getElementById("healthProb").value,
      healthGoal: document.getElementById("healthGoal").value,
      product: document.getElementById("product").value.trim(),
      qty: document.getElementById("qty").value,
      total: document.getElementById("total").value,
      runOut: document.getElementById("runOut").value
    };

    fetch(GOOGLE_WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(data)
    })
    .then(() => {
      successMsg.style.display = "block";
      document.getElementById("crmForm").reset();

      document.getElementById("typeNew").checked = true;
      toggleCustomerType();

      btn.disabled = false;
      btn.innerText = text[currentLang].save;

      setTimeout(() => {
        successMsg.style.display = "none";
      }, 4000);
    })
    .catch(err => {
      errorMsg.innerText = "Error: " + err;
      errorMsg.style.display = "block";

      btn.disabled = false;
      btn.innerText = text[currentLang].save;
    });
  });

  setupRunOutDropdown();
  toggleCustomerType();
</script>

</body>
</html>
