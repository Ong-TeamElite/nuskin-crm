<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Nu Skin CRM</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      color: #0082c6;
      font-size: 26px;
      margin: 0;
    }

    h2 {
      color: #0f172a;
      font-size: 20px;
      margin-top: 35px;
      margin-bottom: 12px;
    }

    h3 {
      margin-top: 0;
      color: #0f172a;
    }

    .lang-btn {
      background: #e2e8f0;
      border: none;
      padding: 8px 14px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .section-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .radio-group {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      background: #f8fafc;
      padding: 15px;
      border-radius: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .radio-option input {
      width: auto;
      margin: 0;
    }

    .radio-option label {
      display: inline;
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #475569;
    }

    input, select {
      width: 100%;
      padding: 11px;
      margin-bottom: 15px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
      background: white;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .col {
      flex: 1;
    }

    button.primary {
      width: 100%;
      background: #0082c6;
      color: white;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      width: 100%;
      background: #0f172a;
      color: white;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button.small-btn {
      width: 100%;
      background: #e2e8f0;
      color: #0f172a;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    #successMsg {
      display: none;
      padding: 15px;
      background: #dcfce3;
      color: #166534;
      text-align: center;
      border-radius: 8px;
      font-weight: bold;
      margin-top: 15px;
    }

    #errorMsg {
      display: none;
      padding: 15px;
      background: #fee2e2;
      color: #991b1b;
      text-align: center;
      border-radius: 8px;
      font-weight: bold;
      margin-top: 15px;
    }

    #customerLoadMsg {
      display: none;
      padding: 12px;
      background: #fff7ed;
      color: #9a3412;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 15px;
    }

    #dashboardResult {
      display: none;
      margin-top: 18px;
    }

    .customer-box {
      background: #eef6ff;
      border: 1px solid #bfdbfe;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .customer-box p {
      margin: 6px 0;
      font-size: 14px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 13px;
      background: white;
    }

    th, td {
      border: 1px solid #e2e8f0;
      padding: 9px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #f1f5f9;
      font-weight: 700;
    }

    .summary-row {
      background: #f8fafc;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
      font-weight: bold;
    }

    .small-note {
      color: #64748b;
      font-size: 13px;
      margin-top: -5px;
      margin-bottom: 15px;
    }

    @media (max-width: 600px) {
      .row {
        flex-direction: column;
        gap: 0;
      }

      h1 {
        font-size: 22px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 7px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header-bar">
    <h1 id="titleText">Nu Skin CRM</h1>
    <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN / TH</button>
  </div>

  <h2 id="formTitle">Add Customer / Order</h2>

  <div class="radio-group">
    <div class="radio-option">
      <input type="radio" id="typeNew" name="custType" value="new" checked onchange="toggleCustomerType()">
      <label for="typeNew" id="lblNew">New Customer</label>
    </div>

    <div class="radio-option">
      <input type="radio" id="typeExist" name="custType" value="exist" onchange="toggleCustomerType()">
      <label for="typeExist" id="lblExist">Existing Customer</label>
    </div>
  </div>

  <div id="customerLoadMsg"></div>

  <form id="crmForm">

    <div id="manualNameBox">
      <label id="lblName">Full Name</label>
      <input type="text" id="name" required placeholder="Enter new customer full name">
    </div>

    <div id="existingCustomerBox" style="display:none;">
      <label id="lblExistingSelect">Choose Existing Customer</label>
      <select id="existingCustomerSelect" onchange="selectExistingCustomer()">
        <option value="">Loading customers...</option>
      </select>

      <button type="button" class="small-btn" onclick="refreshCustomerList()" id="btnRefreshCustomers">
        Refresh Customer List
      </button>
    </div>

    <div id="newCustFields">
      <div class="row">
        <div class="col">
          <label id="lblSex">Sex</label>
          <select id="sex">
            <option value="F" id="optFemale">Female</option>
            <option value="M" id="optMale">Male</option>
          </select>
        </div>

        <div class="col">
          <label id="lblAge">Age</label>
          <input type="number" id="age">
        </div>
      </div>

      <label id="lblPhone">Tel</label>
      <input type="tel" id="phone">

      <label id="lblLine">LINE ID</label>
      <input type="text" id="line">

      <label id="lblSocial">Social Media Link</label>
      <input type="text" id="social">

      <label id="lblProb">Health Problem</label>
      <input type="text" id="healthProb">

      <label id="lblGoal">Health Goal</label>
      <input type="text" id="healthGoal">
    </div>

    <label id="lblProd">Product Name</label>
    <input type="text" id="product" required>

    <div class="row">
      <div class="col">
        <label id="lblQty">Quantity</label>
        <input type="number" id="qty" required value="1">
      </div>

      <div class="col">
        <label id="lblCost">Total Cost</label>
        <input type="number" id="total" required>
      </div>
    </div>

    <label id="lblRunOut">Run Out (Months)</label>
    <select id="runOut"></select>

    <button type="submit" class="primary" id="btnSave">Save Order & Set Calendar</button>
  </form>

  <div id="successMsg">Data Saved!</div>
  <div id="errorMsg"></div>


  <h2 id="dashboardTitle">Customer Dashboard</h2>

  <div class="section-card">
    <label id="lblDashboardSelect">Choose Customer</label>
    <select id="dashboardCustomerSelect" onchange="selectDashboardCustomer()">
      <option value="">Loading customers...</option>
    </select>

    <button type="button" class="small-btn" onclick="refreshCustomerList()" id="btnRefreshDashboard">
      Refresh Customer List
    </button>

    <input type="hidden" id="dashboardName">

    <p class="small-note" id="dashboardNote">
      Choose a customer to see product order history from the past 24 months.
    </p>

    <button type="button" class="secondary" id="btnDashboard" onclick="loadDashboard()">
      Show Dashboard
    </button>

    <div id="dashboardResult"></div>
  </div>

</div>


<script>
  const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyLL-wNiC2ZBdfkwFzYukfPCc_yx6UMbIIuO33BGZpS_ZxvQ65hEzcOzuEfS7RJ21Nt/exec";

  let currentLang = "EN";
  let customerList = [];

  const text = {
    EN: {
      title: "Nu Skin CRM",
      formTitle: "Add Customer / Order",
      newCustomer: "New Customer",
      existingCustomer: "Existing Customer",
      fullName: "Full Name",
      chooseExisting: "Choose Existing Customer",
      chooseCustomer: "Choose Customer",
      refreshCustomers: "Refresh Customer List",
      loadingCustomers: "Loading customers...",
      noCustomers: "No customers found",
      selectCustomer: "Select customer",
      newNamePlaceholder: "Enter new customer full name",
      sex: "Sex",
      female: "Female",
      male: "Male",
      age: "Age",
      tel: "Tel",
      line: "LINE ID",
      social: "Social Media Link",
      healthProblem: "Health Problem",
      healthGoal: "Health Goal",
      product: "Product Name",
      quantity: "Quantity",
      totalCost: "Total Cost",
      runOut: "Run Out (Months)",
      save: "Save Order & Set Calendar",
      saved: "Data Saved!",
      saving: "Saving...",
      dashboardTitle: "Customer Dashboard",
      dashboardNote: "Choose a customer to see product order history from the past 24 months.",
      showDashboard: "Show Dashboard",
      loading: "Loading...",
      notFound: "Customer not found.",
      customerInfo: "Customer Information",
      orderHistory: "Product Order History - Past 24 Months",
      noOrders: "No orders found in the past 24 months.",
      totalSpent: "Total Spent",
      totalQty: "Total Quantity",
      date: "Date",
      productCol: "Product",
      qtyCol: "Qty",
      totalCol: "Total",
      runOutCol: "Run Out",
      customerListLoaded: "Customer list loaded",
      customerListError: "Cannot load customer list. Please check Apps Script deployment and run testCustomerList."
    },
    TH: {
      title: "Nu Skin CRM",
      formTitle: "เพิ่มลูกค้า / เพิ่มออเดอร์",
      newCustomer: "ลูกค้าใหม่",
      existingCustomer: "ลูกค้าเดิม",
      fullName: "ชื่อ-นามสกุล",
      chooseExisting: "เลือกลูกค้าเดิม",
      chooseCustomer: "เลือกลูกค้า",
      refreshCustomers: "อัปเดตรายชื่อลูกค้า",
      loadingCustomers: "กำลังโหลดรายชื่อลูกค้า...",
      noCustomers: "ยังไม่มีรายชื่อลูกค้า",
      selectCustomer: "เลือกลูกค้า",
      newNamePlaceholder: "กรอกชื่อลูกค้าใหม่",
      sex: "เพศ",
      female: "หญิง",
      male: "ชาย",
      age: "อายุ",
      tel: "เบอร์โทร",
      line: "LINE ID",
      social: "ลิงก์โซเชียล",
      healthProblem: "ปัญหาสุขภาพ",
      healthGoal: "เป้าหมายสุขภาพ",
      product: "ชื่อสินค้า",
      quantity: "จำนวน",
      totalCost: "ยอดรวม",
      runOut: "สินค้าหมดในกี่เดือน",
      save: "บันทึกออเดอร์และตั้งเตือน",
      saved: "บันทึกข้อมูลแล้ว!",
      saving: "กำลังบันทึก...",
      dashboardTitle: "Dashboard ลูกค้า",
      dashboardNote: "เลือกลูกค้าเพื่อดูประวัติการซื้อย้อนหลัง 24 เดือน",
      showDashboard: "แสดง Dashboard",
      loading: "กำลังโหลด...",
      notFound: "ไม่พบลูกค้า",
      customerInfo: "ข้อมูลลูกค้า",
      orderHistory: "ประวัติการซื้อสินค้า ย้อนหลัง 24 เดือน",
      noOrders: "ไม่พบออเดอร์ย้อนหลัง 24 เดือน",
      totalSpent: "ยอดซื้อรวม",
      totalQty: "จำนวนรวม",
      date: "วันที่",
      productCol: "สินค้า",
      qtyCol: "จำนวน",
      totalCol: "ยอดรวม",
      runOutCol: "วันสินค้าหมด",
      customerListLoaded: "โหลดรายชื่อลูกค้าแล้ว",
      customerListError: "โหลดรายชื่อลูกค้าไม่ได้ กรุณาเช็ค Apps Script deployment และ run testCustomerList"
    }
  };

  const runOutSelect = document.getElementById("runOut");


  function setupRunOutDropdown() {
    runOutSelect.innerHTML = "";

    for (let i = 1; i <= 12; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.innerHTML = currentLang === "EN" ? i + " Months" : i + " เดือน";
      runOutSelect.appendChild(opt);
    }
  }


  function toggleCustomerType() {
    const isNew = document.getElementById("typeNew").checked;

    document.getElementById("manualNameBox").style.display = isNew ? "block" : "none";
    document.getElementById("existingCustomerBox").style.display = isNew ? "none" : "block";
    document.getElementById("newCustFields").style.display = isNew ? "block" : "none";

    if (isNew) {
      document.getElementById("name").required = true;
      document.getElementById("name").placeholder = text[currentLang].newNamePlaceholder;
      document.getElementById("existingCustomerSelect").required = false;
    } else {
      document.getElementById("name").required = false;
      document.getElementById("existingCustomerSelect").required = true;
      selectExistingCustomer();
    }
  }


  function toggleLang() {
    currentLang = currentLang === "EN" ? "TH" : "EN";
    applyLanguage();
  }


  function applyLanguage() {
    const t = text[currentLang];

    document.getElementById("titleText").innerText = t.title;
    document.getElementById("formTitle").innerText = t.formTitle;
    document.getElementById("lblNew").innerText = t.newCustomer;
    document.getElementById("lblExist").innerText = t.existingCustomer;
    document.getElementById("lblName").innerText = t.fullName;
    document.getElementById("lblExistingSelect").innerText = t.chooseExisting;
    document.getElementById("lblDashboardSelect").innerText = t.chooseCustomer;
    document.getElementById("btnRefreshCustomers").innerText = t.refreshCustomers;
    document.getElementById("btnRefreshDashboard").innerText = t.refreshCustomers;

    document.getElementById("lblSex").innerText = t.sex;
    document.getElementById("optFemale").innerText = t.female;
    document.getElementById("optMale").innerText = t.male;
    document.getElementById("lblAge").innerText = t.age;
    document.getElementById("lblPhone").innerText = t.tel;
    document.getElementById("lblLine").innerText = t.line;
    document.getElementById("lblSocial").innerText = t.social;
    document.getElementById("lblProb").innerText = t.healthProblem;
    document.getElementById("lblGoal").innerText = t.healthGoal;
    document.getElementById("lblProd").innerText = t.product;
    document.getElementById("lblQty").innerText = t.quantity;
    document.getElementById("lblCost").innerText = t.totalCost;
    document.getElementById("lblRunOut").innerText = t.runOut;
    document.getElementById("btnSave").innerText = t.save;
    document.getElementById("successMsg").innerText = t.saved;

    document.getElementById("dashboardTitle").innerText = t.dashboardTitle;
    document.getElementById("dashboardNote").innerText = t.dashboardNote;
    document.getElementById("btnDashboard").innerText = t.showDashboard;

    setupRunOutDropdown();
    populateCustomerDropdowns();
    toggleCustomerType();
  }


  /****************************************************
   * Load customer names from Google Sheet
   ****************************************************/
  function refreshCustomerList() {
    const callbackName = "crmCustomersCallback_" + Date.now();
    const script = document.createElement("script");

    setCustomerDropdownLoading();
    showCustomerLoadMsg("");

    window[callbackName] = function(response) {
      if (response && response.status === "success") {
        customerList = response.customers || [];

        if (customerList.length > 0) {
          showCustomerLoadMsg(text[currentLang].customerListLoaded + ": " + customerList.length, "success");
        } else {
          showCustomerLoadMsg(text[currentLang].noCustomers, "warning");
        }
      } else {
        customerList = [];
        showCustomerLoadMsg(text[currentLang].customerListError, "warning");
      }

      populateCustomerDropdowns();

      delete window[callbackName];
      script.remove();
    };

    script.src =
      GOOGLE_WEB_APP_URL +
      "?action=customers" +
      "&callback=" + callbackName +
      "&t=" + Date.now();

    script.onerror = function() {
      customerList = [];
      populateCustomerDropdowns();
      showCustomerLoadMsg(text[currentLang].customerListError, "warning");
      delete window[callbackName];
      script.remove();
    };

    document.body.appendChild(script);
  }


  function showCustomerLoadMsg(message, type) {
    const box = document.getElementById("customerLoadMsg");

    if (!message) {
      box.style.display = "none";
      box.innerText = "";
      return;
    }

    box.style.display = "block";
    box.innerText = message;

    if (type === "success") {
      box.style.background = "#dcfce3";
      box.style.color = "#166534";
    } else {
      box.style.background = "#fff7ed";
      box.style.color = "#9a3412";
    }

    setTimeout(function() {
      box.style.display = "none";
    }, 5000);
  }


  function setCustomerDropdownLoading() {
    const t = text[currentLang];

    document.getElementById("existingCustomerSelect").innerHTML =
      "<option value=''>" + t.loadingCustomers + "</option>";

    document.getElementById("dashboardCustomerSelect").innerHTML =
      "<option value=''>" + t.loadingCustomers + "</option>";
  }


  function populateCustomerDropdowns() {
    const t = text[currentLang];

    const existingSelect = document.getElementById("existingCustomerSelect");
    const dashboardSelect = document.getElementById("dashboardCustomerSelect");

    const existingValue = existingSelect.value;
    const dashboardValue = dashboardSelect.value;

    existingSelect.innerHTML = "";
    dashboardSelect.innerHTML = "";

    if (!customerList || customerList.length === 0) {
      existingSelect.innerHTML = "<option value=''>" + t.noCustomers + "</option>";
      dashboardSelect.innerHTML = "<option value=''>" + t.noCustomers + "</option>";
      return;
    }

    const defaultOption1 = document.createElement("option");
    defaultOption1.value = "";
    defaultOption1.textContent = t.selectCustomer;
    existingSelect.appendChild(defaultOption1);

    const defaultOption2 = document.createElement("option");
    defaultOption2.value = "";
    defaultOption2.textContent = t.selectCustomer;
    dashboardSelect.appendChild(defaultOption2);

    customerList.forEach(function(customer) {
      const name = customer.fullName || "";

      const option1 = document.createElement("option");
      option1.value = name;
      option1.textContent = name;
      existingSelect.appendChild(option1);

      const option2 = document.createElement("option");
      option2.value = name;
      option2.textContent = name;
      dashboardSelect.appendChild(option2);
    });

    if (existingValue) {
      existingSelect.value = existingValue;
    }

    if (dashboardValue) {
      dashboardSelect.value = dashboardValue;
      selectDashboardCustomer();
    }
  }


  function selectExistingCustomer() {
    const selectedName = document.getElementById("existingCustomerSelect").value;
    document.getElementById("name").value = selectedName;
  }


  function selectDashboardCustomer() {
    const selectedName = document.getElementById("dashboardCustomerSelect").value;
    document.getElementById("dashboardName").value = selectedName;
  }


  /****************************************************
   * Save order form
   ****************************************************/
  document.getElementById("crmForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const isNew = document.getElementById("typeNew").checked;

    if (!isNew) {
      selectExistingCustomer();
    }

    const selectedName = document.getElementById("name").value.trim();

    if (!selectedName) {
      alert(currentLang === "EN" ? "Please choose customer." : "กรุณาเลือกลูกค้า");
      return;
    }

    const btn = document.getElementById("btnSave");
    const successMsg = document.getElementById("successMsg");
    const errorMsg = document.getElementById("errorMsg");

    btn.disabled = true;
    btn.innerText = text[currentLang].saving;
    successMsg.style.display = "none";
    errorMsg.style.display = "none";

    const data = {
      isNew: isNew,
      name: selectedName,
      sex: document.getElementById("sex").value,
      age: document.getElementById("age").value,
      phone: document.getElementById("phone").value,
      line: document.getElementById("line").value,
      social: document.getElementById("social").value,
      healthProb: document.getElementById("healthProb").value,
      healthGoal: document.getElementById("healthGoal").value,
      product: document.getElementById("product").value.trim(),
      qty: document.getElementById("qty").value,
      total: document.getElementById("total").value,
      runOut: document.getElementById("runOut").value
    };

    fetch(GOOGLE_WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(data)
    })
    .then(() => {
      successMsg.style.display = "block";

      document.getElementById("crmForm").reset();
      document.getElementById("typeNew").checked = true;
      toggleCustomerType();

      document.getElementById("dashboardName").value = selectedName;

      btn.disabled = false;
      btn.innerText = text[currentLang].save;

      refreshCustomerList();

      setTimeout(() => {
        successMsg.style.display = "none";
      }, 4000);
    })
    .catch(err => {
      errorMsg.innerText = "Error: " + err;
      errorMsg.style.display = "block";

      btn.disabled = false;
      btn.innerText = text[currentLang].save;
    });
  });


  /****************************************************
   * Dashboard via JSONP
   ****************************************************/
  function loadDashboard() {
    selectDashboardCustomer();

    const name = document.getElementById("dashboardName").value.trim();
    const resultDiv = document.getElementById("dashboardResult");
    const btn = document.getElementById("btnDashboard");

    if (!name) {
      alert(currentLang === "EN" ? "Please choose customer." : "กรุณาเลือกลูกค้า");
      return;
    }

    btn.disabled = true;
    btn.innerText = text[currentLang].loading;

    resultDiv.style.display = "block";
    resultDiv.innerHTML = "<p>" + text[currentLang].loading + "</p>";

    const callbackName = "crmDashboardCallback_" + Date.now();
    const script = document.createElement("script");

    window[callbackName] = function(response) {
      renderDashboard(response);

      btn.disabled = false;
      btn.innerText = text[currentLang].showDashboard;

      delete window[callbackName];
      script.remove();
    };

    script.src =
      GOOGLE_WEB_APP_URL +
      "?action=dashboard" +
      "&name=" + encodeURIComponent(name) +
      "&callback=" + callbackName +
      "&t=" + Date.now();

    script.onerror = function() {
      resultDiv.innerHTML = "<p style='color:red;'>Dashboard loading error.</p>";
      btn.disabled = false;
      btn.innerText = text[currentLang].showDashboard;
      delete window[callbackName];
      script.remove();
    };

    document.body.appendChild(script);
  }


  function renderDashboard(response) {
    const resultDiv = document.getElementById("dashboardResult");
    const t = text[currentLang];

    if (!response || response.status === "error") {
      resultDiv.innerHTML = "<p style='color:red;'>" + (response ? response.message : "Error") + "</p>";
      return;
    }

    if (response.status === "not_found") {
      resultDiv.innerHTML = "<p style='color:red;'>" + t.notFound + "</p>";
      return;
    }

    const customer = response.customer;
    const orders = response.orders || [];

    let html = "";

    html += "<div class='customer-box'>";
    html += "<h3>" + t.customerInfo + "</h3>";
    html += "<p><strong>Name:</strong> " + safe(customer.fullName) + "</p>";
    html += "<p><strong>Tel:</strong> " + safe(customer.tel) + "</p>";
    html += "<p><strong>LINE:</strong> " + safe(customer.lineID) + "</p>";
    html += "<p><strong>Health Goal:</strong> " + safe(customer.healthGoals) + "</p>";
    html += "<p><strong>Health Problem:</strong> " + safe(customer.healthProblems) + "</p>";
    html += "</div>";

    html += "<h3>" + t.orderHistory + "</h3>";

    if (orders.length === 0) {
      html += "<p>" + t.noOrders + "</p>";
      resultDiv.innerHTML = html;
      return;
    }

    let totalSpent = 0;
    let totalQty = 0;

    html += "<div class='table-wrap'>";
    html += "<table>";
    html += "<tr>";
    html += "<th>" + t.date + "</th>";
    html += "<th>" + t.productCol + "</th>";
    html += "<th>" + t.qtyCol + "</th>";
    html += "<th>" + t.totalCol + "</th>";
    html += "<th>" + t.runOutCol + "</th>";
    html += "</tr>";

    orders.forEach(order => {
      const orderTotal = Number(order.total || 0);
      const orderQty = Number(order.quantity || 0);

      totalSpent += orderTotal;
      totalQty += orderQty;

      html += "<tr>";
      html += "<td>" + safe(order.orderDate) + "</td>";
      html += "<td>" + safe(order.productName) + "</td>";
      html += "<td>" + safe(order.quantity) + "</td>";
      html += "<td>" + formatMoney(order.total) + "</td>";
      html += "<td>" + safe(order.runOutDate) + "</td>";
      html += "</tr>";
    });

    html += "</table>";
    html += "</div>";

    html += "<div class='summary-row'>";
    html += t.totalQty + ": " + totalQty + " | ";
    html += t.totalSpent + ": " + formatMoney(totalSpent);
    html += "</div>";

    resultDiv.innerHTML = html;
  }


  function safe(value) {
    if (value === null || value === undefined) {
      return "";
    }

    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }


  function formatMoney(value) {
    const number = Number(value || 0);

    return number.toLocaleString("en-US", {
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    });
  }


  setupRunOutDropdown();
  toggleCustomerType();
  refreshCustomerList();
</script>

</body>
</html>
