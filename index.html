<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nu Skin CRM</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { color: #0082c6; font-size: 22px; margin: 0; }
    .lang-btn { background: #e2e8f0; border: none; padding: 6px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    .radio-group { display: flex; gap: 15px; margin-bottom: 20px; background: #f8fafc; padding: 10px; border-radius: 8px; flex-wrap: wrap; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #475569; }
    input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
    button.primary { width: 100%; background: #0082c6; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
    #successMsg { display: none; padding: 15px; background: #dcfce3; color: #166534; text-align: center; border-radius: 6px; font-weight: bold; margin-top: 15px; }
  </style>
</head>
<body>

<div class="container">
  <div class="header-bar">
    <h1 id="titleText">Nu Skin CRM</h1>
    <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN / TH</button>
  </div>

  <div class="radio-group">
    <input type="radio" id="typeNew" name="custType" value="new" checked onchange="toggleCustomerType()"> 
    <label for="typeNew" id="lblNew" style="display:inline; margin:0;">New Customer</label>
    <input type="radio" id="typeExist" name="custType" value="exist" onchange="toggleCustomerType()"> 
    <label for="typeExist" id="lblExist" style="display:inline; margin:0;">Existing Customer</label>
  </div>

  <form id="crmForm">
    <div id="newCustFields">
      <label id="lblName">Full Name</label>
      <input type="text" id="name" required>
      <div style="display:flex; gap:10px;">
        <div style="flex:1;"><label id="lblSex">Sex</label><select id="sex"><option value="F">Female</option><option value="M">Male</option></select></div>
        <div style="flex:1;"><label id="lblAge">Age</label><input type="number" id="age"></div>
      </div>
      <label id="lblPhone">Tel</label><input type="tel" id="phone">
      <label>LINE ID</label><input type="text" id="line">
      <label id="lblSocial">Social Media Link</label><input type="text" id="social">
      <label id="lblProb">Health Problem</label><input type="text" id="healthProb">
      <label id="lblGoal">Health Goal</label><input type="text" id="healthGoal">
    </div>

    <label id="lblProd">Product Name</label><input type="text" id="product" required>
    <div style="display:flex; gap:10px;">
      <div style="flex:1;"><label id="lblQty">Amount</label><input type="number" id="qty" required value="1"></div>
      <div style="flex:1;"><label id="lblCost">Total Cost</label><input type="number" id="total" required></div>
    </div>
    <label id="lblRunOut">Run Out (Months)</label><select id="runOut"></select>
    <button type="submit" class="primary" id="btnSave">Save Order & Set Calendar</button>
  </form>
  <div id="successMsg">Data Saved!</div>
</div>

<script>
  const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyLL-wNiC2ZBdfkwFzYukfPCc_yx6UMbIIuO33BGZpS_ZxvQ65hEzcOzuEfS7RJ21Nt/exec";

  // Setup 1-12 Month Dropdown
  const runOutSelect = document.getElementById('runOut');
  for(let i=1; i<=12; i++) {
    let opt = document.createElement('option');
    opt.value = i; opt.innerHTML = i + " Months";
    runOutSelect.appendChild(opt);
  }

  function toggleCustomerType() {
    document.getElementById('newCustFields').style.display = document.getElementById('typeNew').checked ? 'block' : 'none';
  }

  document.getElementById('crmForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    
    const data = {
      isNew: document.getElementById('typeNew').checked,
      name: document.getElementById('name').value,
      sex: document.getElementById('sex').value,
      age: document.getElementById('age').value,
      phone: document.getElementById('phone').value,
      line: document.getElementById('line').value,
      social: document.getElementById('social').value,
      healthProb: document.getElementById('healthProb').value,
      healthGoal: document.getElementById('healthGoal').value,
      product: document.getElementById('product').value,
      qty: document.getElementById('qty').value,
      total: document.getElementById('total').value,
      runOut: document.getElementById('runOut').value
    };

    fetch(GOOGLE_WEB_APP_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    }).then(() => {
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('crmForm').reset();
      btn.disabled = false;
      setTimeout(() => { document.getElementById('successMsg').style.display = 'none'; }, 4000);
    }).catch(err => { alert("Error: " + err); btn.disabled = false; });
  });
</script>
</body>
</html>
